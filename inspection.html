<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📦 驗貨桌快捷呼叫台 - SmartOffice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: manipulation;
        }
        .btn-call:active {
            transform: scale(0.94);
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex flex-col antialiased select-none">

    <!-- 頂部標頭 -->
    <header class="bg-gradient-to-r from-amber-600 to-amber-500 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-md mx-auto px-4 py-3.5 flex justify-between items-center">
            <div class="flex items-center space-x-2.5">
                <div class="bg-white/20 p-2 rounded-xl">
                    <i class="fa-solid fa-boxes-packing text-xl text-yellow-200"></i>
                </div>
                <div>
                    <h1 class="text-lg font-extrabold tracking-tight leading-tight">驗貨桌快捷呼叫</h1>
                    <p class="text-[10px] text-amber-100 font-medium">SmartOffice 一鍵雲端廣播</p>
                </div>
            </div>
            
            <!-- 雲端同步指示器 -->
            <div class="flex items-center space-x-2 bg-black/20 px-3 py-1 rounded-full text-[11px] font-semibold">
                <span id="cloud-status-dot" class="h-2 w-2 rounded-full bg-yellow-300 animate-pulse"></span>
                <span id="cloud-status-text">連線中...</span>
            </div>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-grow max-w-md w-full mx-auto p-4 space-y-4 flex flex-col">
        
        <!-- Toast 通知提示彈窗容器 -->
        <div id="toast-container" class="fixed top-16 left-1/2 -translate-x-1/2 z-50 w-11/12 max-w-sm pointer-events-none space-y-2"></div>

        <!-- 搜尋列 -->
        <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" id="search-input" oninput="filterStaff()" placeholder="搜尋員工姓名..." class="w-full bg-white border border-slate-200 rounded-2xl pl-10 pr-4 py-3 text-sm font-semibold shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-all">
        </div>

        <!-- 說明提示語 -->
        <div class="flex items-center justify-between text-xs text-slate-500 px-1 font-medium">
            <span>點擊姓名即可發送廣播叫人：</span>
            <span id="staff-count" class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full font-bold text-[10px]">載入中...</span>
        </div>

        <!-- 員工卡片按鈕網格 (專為手機大按鈕設計) -->
        <div id="staff-grid" class="grid grid-cols-2 gap-3 flex-grow overflow-y-auto pb-6">
            <div class="col-span-2 text-center py-12 text-slate-400 space-y-2">
                <i class="fa-solid fa-spinner animate-spin text-2xl text-amber-500"></i>
                <p class="text-xs font-semibold">正在同步雲端員工名單...</p>
            </div>
        </div>

    </main>

    <!-- 頁尾狀態 -->
    <footer class="bg-white border-t border-slate-200 py-2.5 px-4 text-center text-[11px] text-slate-400 font-medium">
        <span>📍 廣播內容：「[姓名]，請到驗貨桌～[姓名]，請到驗貨桌～」</span>
    </footer>

    <!-- 核心 JS 模組 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 專案設定金鑰
        const USER_FIREBASE_CONFIG = {
            apiKey: "AIzaSyCDCIxvrTUesekzG44UcdN5f1rrxcHn4u8",
            authDomain: "smart-office-broadcast2.firebaseapp.com",
            projectId: "smart-office-broadcast2",
            storageBucket: "smart-office-broadcast2.firebasestorage.app",
            messagingSenderId: "620583773496",
            appId: "1:620583773496:web:df81fbdcd4853071070dcd"
        };

        const USER_APP_ID = "smart-office-broadcast2";

        window.appState = {
            appId: USER_APP_ID,
            db: null,
            auth: null,
            userId: null,
            staff: [],
            defaultStaff: ['0101主任', '0102店長', '0103姝敏', '0124志弘', '0201JEFF', '0202傑宇']
        };

        // 雲端資料庫操作封裝
        window.dbOps = {
            sendBroadcast: async (payload) => {
                if (!window.appState.db) throw new Error("資料庫尚未連接");
                const colRef = collection(window.appState.db, 'artifacts', window.appState.appId, 'public', 'data', 'broadcasts');
                return await addDoc(colRef, payload);
            }
        };

        // 初始化 Firebase
        async function initFirebase() {
            const statusDot = document.getElementById('cloud-status-dot');
            const statusText = document.getElementById('cloud-status-text');

            try {
                const app = initializeApp(USER_FIREBASE_CONFIG);
                const auth = getAuth(app);
                const db = getFirestore(app);

                window.appState.db = db;
                window.appState.auth = auth;

                let userCredential;
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    userCredential = await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    userCredential = await signInAnonymously(auth);
                }

                window.appState.userId = userCredential.user.uid;

                statusDot.className = "h-2 w-2 rounded-full bg-emerald-400 animate-pulse";
                statusText.innerText = "已同步雲端";

                setupRealtimeStaffSync();

            } catch (err) {
                console.warn("雲端初始化失敗，切換為離線模式:", err);
                statusDot.className = "h-2 w-2 rounded-full bg-red-400";
                statusText.innerText = "單機模式";
                loadFallbackStaff();
            }
        }

        // 實時監聽主控制台的名單設定
        function setupRealtimeStaffSync() {
            const { db, appId } = window.appState;
            const configDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'settings');

            onSnapshot(configDocRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    window.appState.staff = data.staff || window.appState.defaultStaff;
                } else {
                    window.appState.staff = window.appState.defaultStaff;
                }
                renderStaffGrid();
            }, (err) => {
                console.error("同步員工名單失敗:", err);
                loadFallbackStaff();
            });
        }

        function loadFallbackStaff() {
            window.appState.staff = JSON.parse(localStorage.getItem('mock_staff')) || window.appState.defaultStaff;
            renderStaffGrid();
        }

        window.addEventListener('load', initFirebase);
    </script>

    <!-- 介面渲染與點擊叫人邏輯 -->
    <script>
        // 渲染員工網格按鈕
        function renderStaffGrid() {
            const grid = document.getElementById('staff-grid');
            const countBadge = document.getElementById('staff-count');
            if (!grid) return;

            const staffList = window.appState.staff || [];
            if (countBadge) countBadge.innerText = `${staffList.length} 人`;

            if (staffList.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-2 text-center py-12 text-slate-400 text-xs">
                        尚無員工名單，請至主控台設定新增
                    </div>`;
                return;
            }

            grid.innerHTML = '';
            staffList.forEach(name => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'btn-call bg-white hover:bg-amber-500 hover:text-white text-slate-800 border border-slate-200/80 hover:border-amber-500 rounded-2xl p-4 shadow-sm transition-all duration-200 flex flex-col items-center justify-center space-y-1.5 group relative overflow-hidden active:bg-amber-600';
                
                btn.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-amber-50 group-hover:bg-white/20 text-amber-600 group-hover:text-white flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-bullhorn text-lg"></i>
                    </div>
                    <span class="text-sm font-bold truncate w-full text-center tracking-tight">${name}</span>
                    <span class="text-[10px] text-slate-400 group-hover:text-amber-100 font-normal">一鍵叫至驗貨桌</span>
                `;

                btn.onclick = () => callStaffToInspection(name, btn);
                grid.appendChild(btn);
            });
        }

        // ⚡ 點擊員工一鍵發送叫人廣播
        async function callStaffToInspection(name, btnElement) {
            const broadcastText = `${name}，請到驗貨桌～${name}，請到驗貨桌～`;
            
            const payload = {
                text: broadcastText,
                timestamp: Date.now(),
                sender: window.appState.userId || 'inspection-mobile',
                name: name,
                location: '驗貨桌'
            };

            // 按鈕瞬間效果
            if (btnElement) {
                btnElement.classList.add('ring-4', 'ring-amber-300');
                setTimeout(() => btnElement.classList.remove('ring-4', 'ring-amber-300'), 600);
            }

            try {
                if (window.dbOps && window.appState.db) {
                    await window.dbOps.sendBroadcast(payload);
                    showToast(`📢 已送出廣播：「${name}」請到驗貨桌！`, "success");
                } else {
                    showToast(`📢 (離線模式) 已模擬呼叫「${name}」`, "info");
                }
            } catch (err) {
                console.error("發送失敗:", err);
                showToast("發送失敗，請確認網路連線", "error");
            }
        }

        // 快速過濾員工
        function filterStaff() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const buttons = document.querySelectorAll('#staff-grid button');
            
            buttons.forEach(btn => {
                const name = btn.innerText.toLowerCase();
                btn.classList.toggle('hidden', !name.includes(query));
            });
        }

        // Toast 訊息提示元件
        function showToast(message, type = "info") {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            let bgBg = type === "success" ? "bg-emerald-600 text-white" : (type === "error" ? "bg-red-600 text-white" : "bg-slate-800 text-white");
            let icon = type === "success" ? "fa-circle-check" : (type === "error" ? "fa-circle-xmark" : "fa-circle-info");

            toast.className = `flex items-center space-x-2.5 ${bgBg} px-4 py-3 rounded-2xl shadow-xl transition-all duration-300 transform -translate-y-2 opacity-0 pointer-events-auto text-xs font-bold`;
            toast.innerHTML = `<i class="fa-solid ${icon} text-base shrink-0"></i><span>${message}</span>`;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('-translate-y-2', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
